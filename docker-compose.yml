services:
  db:
    image: postgres:16
    container_name: filehub-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 40s

  app:
    build: ./app
    container_name: filehub-app
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    command: [ "bash", "-lc", "python manage.py runserver 0.0.0.0:8000" ]
  nginx:
    image: nginx:stable
    container_name: filehub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/var/www/uploads:ro
    depends_on:
      - app
