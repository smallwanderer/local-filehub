services:
  db:
    image: pgvector/pgvector:pg16
    container_name: filehub-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: filehub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: ./app
    container_name: filehub-app
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    command: [ "bash", "-lc", "python manage.py runserver 0.0.0.0:8000" ]

    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/files/healthcheck/" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 60s

  celery-worker:
    build: ./app
    container_name: filehub-celery-worker
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "bash", "-lc", "celery -A config worker -l info -Q parse,embed" ]

  celery-beat:
    build: ./app
    container_name: filehub-celery-beat
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "bash", "-lc", "celery -A config beat -l info" ]
    profiles:
      - optional

  nginx:
    image: nginx:stable
    container_name: filehub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/var/www/uploads:ro
    depends_on:
      app:
        condition: service_healthy
